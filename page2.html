<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=K2D:wght@700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style2.css">
  <title>Armageddon</title>
</head>

<body>
  <header>
    <nav>
      <div class="inicio">
        <a href="#">Início</a>
      </div>
      <div class="sobre">
        <a href="#">Sobre</a>
      </div>
    </nav>

    <div class="conta">
      <div class="busca">
        <img src="./Assets/Busca.png">
      </div>
      <div class="sino">
        <img src="./Assets/Sino.png">
      </div>
      <div class="user">
        <img src="./Assets/User.png">
      </div>
    </div>
  </header>

  <main>
    <div class="conteudo">
      <div class="conteudoEsquerda">
        <div class="perfil">
          <div class="imagens">
            <div class="nomeUser">
              <img id="userId" src="./Assets/User.png">
              <p>Nome Sobrenome</p>
            </div>
            <img class="lapis" src="./Assets/Lapis.png">
          </div>
        </div>
        
        <div class="nivel">
          <p class="title">Nível do usuário</p>
          <div class="nivelUser">
            <p>Nível 1</p>
            <img src="./Assets/Barra de Progresso.svg">
          </div>
        </div>
      </div>
      
      <div class="conteudoDireta">
        <div class="sobreConteudo">
          <div class="sobreTop">
            <p>Sobre mim</p>
            <img class="lapis" src="./Assets/Lapis.png">
          </div>
          <div class="borda"></div>
        </div>

        <div class="historico">
          <h2>Histórico</h2>
          <p>Exercícios feitos: <span>15</span> <br> Assertividade: <span>82%</span></p>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="direitos">
      <img src="./Assets/Livro.png">
      <p>Armageddon 2022 <br>Todos os direitos reservados</p>
    </div>
    <div class="contato">
      <p>Contato:<br>armageddonclasses@gmail.com</p>
    </div>
  </footer>
</body>

</html>
